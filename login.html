<!DOCTYPE html>
<html lang="en">
    <head>
        <!--Specifies character encoding to utf-8 for the page, visible area of page, and links style.css as the stylesheet-->
        <meta charset="utf-8">
        <meta name ="viewport" content="width=device-width" />
        <link rel ="stylesheet" href="styles.css">
        <title>Login</title>
    </head>
    <body>
        <h1>Login</h1>
        <form>
            <!-- Displays "User ID" with a field, Displays "Password" with a field, and a submit button-->
            <label for="UserID">User ID:</label><br>
            <input type="text" id="UserID" name ="User ID"><br>
            <label for="Password">Password:</label><br>
            <input type="password" id="Password" name ="Password"><br>
            <input type="submit" value="Submit"><br>
        </form>
        <!-- Link to the "SignUp" page aka the relative signup.html file-->
        <p>New Here? <a href="signup.html" target="_self">Create an Account</a></p>
    </body>
</html>
