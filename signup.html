<!DOCTYPE html>
<html lang="en">
    <head>
        <!--Specifies character encoding to utf-8 for the page, visible area of page, and links style.css as the stylesheet-->
        <meta charset="utf-8">
        <meta name ="viewport" content="width=device-width" />
        <link rel ="stylesheet" href="styles.css">
        <title>Sign Up</title>
    </head>
    <body>
        <h1>Sign Up</h1>
        <form>
            <!-- Displays the user a form to submit their first name, last name, User ID, password, and a link to the login page-->
            <label for="firstName">First Name:</label><br>
            <input type="text" id="firstName" name ="First Name"><br>
            <label for="lastName">Last Name:</label><br>
            <input type="text" id="lastName" name ="Last Name"><br>
            <label for="UserID">User ID:</label><br>
            <input type="text" id="UserID" name ="User ID" ><br>
            <label for="Password">Password:</label><br>
            <input type="password" id="Password" name ="Password"><br>
            <input type="submit" value="Submit"><br>
        </form>
        <!-- Link to the "Login" page aka the relative login.html file-->
        <p>Have An Account? <a href="login.html" target="_self">Login!</a></p>
    </body>
</html>
